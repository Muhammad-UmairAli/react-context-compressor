name: CI

# Runs the same hooks defined in .pre-commit-config.yaml on every PR
# and on every push that isn't to a protected branch. Catches issues
# from developers who haven't run `pre-commit install` locally.
#
# Failing CI blocks the merge per the branch-protection ruleset
# (see .github/rulesets/main.json and develop.json once you wire
# required_status_checks).
#
# See docs/methodology/04-code-quality-and-gates.md.

on:
  pull_request:
    branches: [main, develop]
  push:
    branches-ignore: [main, develop]

jobs:
  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: pre-commit/action@v3.0.1

  build:
    name: Build, lint, test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Full suite runs on Node the test toolchain supports (Vitest 4 needs
        # node:util.styleText, i.e. Node >= 20.12). Node 18 runtime support is
        # validated separately by the `node18-runtime` import smoke below.
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test:cov
      - run: npm run build
      - run: npm run attw
      - run: npm run publint
      - run: npm run size

  react-compat:
    name: React ${{ matrix.react }} compat
    runs-on: ubuntu-latest
    strategy:
      matrix:
        react: ["17", "18", "19"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      # Install the matrixed React major (no-save keeps the lockfile intact;
      # legacy-peer-deps avoids the RTL peer conflict — the SSR smoke test
      # below does not use RTL).
      - run: npm install --no-save --legacy-peer-deps react@${{ matrix.react }} react-dom@${{ matrix.react }}
      - run: npx vitest run src/react/ssr-smoke.test.ts

  node18-runtime:
    name: Node 18 runtime smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      # The published package targets Node >= 18; confirm the built ESM + CJS
      # entries load and export `compress` on Node 18 (the Vitest suite itself
      # needs newer Node, so it runs in the `build` matrix above).
      - name: Import smoke (ESM + CJS)
        run: |
          node -e "import('./dist/index.mjs').then(m => { if (typeof m.compress !== 'function') { throw new Error('ESM export missing'); } console.log('ESM ok:', m.compress({ a: 1 })); })"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.compress !== 'function') { throw new Error('CJS export missing'); } console.log('CJS ok');"
